<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharing My Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #000;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1000') center/cover;
            filter: blur(12px) brightness(0.5);
            transform: scale(1.1);
            z-index: 1;
        }
        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 360px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 35px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .deco-img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { font-size: 20px; color: #1c1e21; margin-bottom: 20px; line-height: 1.5; font-weight: 600; }
        
        .opt-btn {
            display: block; width: 100%; padding: 16px; margin-bottom: 12px;
            background: #f5f6f7; border: 1px solid #eee; border-radius: 15px;
            font-size: 16px; color: #1c1e21; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .opt-btn:active { background: #e4e6eb; transform: translateY(2px); }
        
        .final-btn {
            background: #25D366; color: white; padding: 18px;
            border-radius: 50px; text-decoration: none; display: block;
            font-weight: bold; font-size: 17px; margin-top: 15px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        
        .loading-text { font-size: 14px; color: #888; margin: 20px 0; }
        .bounce { font-size: 30px; animation: bounce 1s infinite; display: inline-block; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    
    <div class="container">
        <div class="step active" id="step1">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=200" class="deco-img">
            <h2>虽然我们还不认识，但我感觉哥哥一定是个很 Nice 的人吧？😊</h2>
            <button class="opt-btn" onclick="nextStep(2)">应该是吧，你觉得咧？</button>
            <button class="opt-btn" onclick="nextStep(2)">看对谁咯，哈哈</button>
        </div>

        <div class="step" id="step2">
            <img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814?q=80&w=200" class="deco-img">
            <h2>其实我超无聊的... 你比较喜欢发消息陪我，还是偶尔出来 Jalan-Jalan？☕</h2>
            <button class="opt-btn" onclick="runLoading()">发消息陪我就好啦</button>
            <button class="opt-btn" onclick="runLoading()">找机会出来喝茶啊</button>
        </div>

        <div class="step" id="stepLoading">
            <div class="loading-text">正在为你连接 Aria 的 WhatsApp...</div>
            <div class="bounce">💌</div>
        </div>

        <div class="step" id="stepFinal">
            <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=200" class="deco-img">
            <h2>Ngam 哦！我也在等一个频率相同的人。✨</h2>
            <p style="color:#65676b; font-size: 14px; line-height: 1.6; margin-bottom: 20px;">
                这是我的私密号，记得跟我打个招呼，不要让我等太久哦，Abang...
            </p>
            <a href="javascript:void(0);" onclick="goWA()" class="final-btn">💬 直接加我 WhatsApp</a>
        </div>
    </div>

    <script>
        // 通用切换函数
        function showStep(stepId) {
            // 隐藏所有步骤
            document.querySelectorAll('.step').forEach(s => {
                s.classList.remove('active');
            });
            // 显示指定步骤
            const target = document.getElementById(stepId);
            if(target) {
                target.classList.add('active');
            }
        }

        function nextStep(num) {
            showStep('step' + num);
        }

        function runLoading() {
            showStep('stepLoading');
            // 1.5秒后自动跳到最后一步
            setTimeout(() => {
                showStep('stepFinal');
            }, 1500);
        }

        function goWA() {
            var text = encodeURIComponent("你好Aria，我通过了你的测试，可以认识你吗？");
            window.location.href = "https://api.whatsapp.com/send?phone=60167263029&text=" + text;
        }
    </script>
</body>
</html>

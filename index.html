<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>遇见 Aria</title>

    <style>
        :root {
            --primary-pink: #ff758c;
            --wa-green: #25D366;
            --glass-bg: rgba(255, 255, 255, 0.96);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, "PingFang SC", sans-serif;
            background: #111; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('2.jpg') center/cover no-repeat;
            filter: blur(12px); transform: scale(1.1); z-index: -1;
        }
        .container {
            position: relative; width: 90%; max-width: 360px; background: var(--glass-bg);
            border-radius: 30px; overflow: hidden; padding: 45px 20px 30px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .progress-bar {
            position: absolute; top: 0; left: 0; height: 6px;
            background: linear-gradient(90deg, #ff758c, #ff7eb3); width: 33%; transition: width 0.6s ease;
        }
        .img-wrapper { position: relative; width: 130px; height: 130px; margin: 0 auto 25px; }
        .deco-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .status-online { position: absolute; bottom: 12px; right: 12px; width: 18px; height: 18px; background: #4cd137; border: 3px solid #fff; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76, 209, 55, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(76, 209, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 209, 55, 0); } }
        h2 { font-size: 20px; color: #222; margin-bottom: 25px; line-height: 1.5; font-weight: 700; }
        .opt-btn { display: block; width: 100%; padding: 16px; margin-bottom: 12px; background: #fff; border: 1px solid #eee; border-radius: 18px; font-size: 16px; color: #333; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .opt-btn:active { background: #fff0f3; transform: scale(0.97); border-color: #ff758c; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .final-btn { background: var(--wa-green); color: white; padding: 18px; border-radius: 50px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; font-size: 18px; margin-top: 15px; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-5px);} 60% {transform: translateY(-3px);} }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-pink); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="container">
        <div class="progress-bar" id="progress"></div>
        <div class="step active" id="step1">
            <div class="img-wrapper"><img src="1.jpg" class="deco-img"><div class="status-online"></div></div>
            <h2>如果你在林间遇见我...<br>你会主动跟我打招呼吗？✨</h2>
            <button class="opt-btn" onclick="nextStep(2, 66)">会啊，你看起来很温柔</button>
            <button class="opt-btn" onclick="nextStep(2, 66)">可能会先偷偷看你一眼</button>
        </div>
        <div class="step" id="step2">
            <div class="img-wrapper"><img src="2.jpg" class="deco-img"></div>
            <h2>其实我超无聊的...<br>你会发消息陪我，还是想见面？☕</h2>
            <button class="opt-btn" onclick="runLoading()">在线陪你聊天</button>
            <button class="opt-btn" onclick="runLoading()">找机会出来见个面</button>
        </div>
        <div class="step" id="stepLoading"><div class="spinner"></div><p style="color:#888;">正在开启私人对话通道...</p></div>
        <div class="step" id="stepFinal">
            <div class="img-wrapper"><img src="3.jpg" class="deco-img"><div class="status-online"></div></div>
            <h2>Ngam 哦！就是这种感觉。✨</h2>
            <p style="color:#666; font-size: 14px; margin-bottom: 20px;">这是我的私密 WhatsApp，<br>记得跟我打招呼，别让我等太久哦... ❤️</p>
            <a href="javascript:void(0);" onclick="goWA()" class="final-btn">💬 立即开始私聊</a>
        </div>
    </div>
    <script>
        const progress = document.getElementById('progress');
        function showStep(stepId) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(stepId).classList.add('active'); }
        function nextStep(num, barWidth) { progress.style.width = barWidth + '%'; showStep('step' + num); }
        function runLoading() { progress.style.width = '90%'; showStep('stepLoading'); setTimeout(() => { progress.style.width = '100%'; showStep('stepFinal'); }, 1500); }
        
        function goWA() {
            // 触发 Facebook 转化追踪事件 (潜在客户)
            if (typeof fbq === 'function') {
                fbq('track', 'Lead');
            }
            // 跳转至分流链接
            window.location.href = "https://hw.url668.com/s/GTCPr8BQN";
        }
    </script>
</body>
</html>

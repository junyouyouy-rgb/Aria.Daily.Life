    <style>
        :root { --soft-red: #ff4d6d; --wa-green: #25D366; --text-main: #2d3436; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, "PingFang SC", sans-serif;
            background: #ffffff; color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            height: 100vh; overflow: hidden; /* 强制禁止滚动 */
        }

        .main-card {
            width: 100%; max-width: 420px; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* 图片展示区优化：上下结构 */
        .photo-section {
            padding: 8px; flex-shrink: 0;
        }
        .img-top {
            width: 100%; height: 32vh; /* 顶部大图占32%高度 */
            object-fit: cover; border-radius: 15px; margin-bottom: 6px;
        }
        .img-bottom-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
            height: 14vh; /* 下方两张图并排占14%高度 */
        }
        .img-bottom-row img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 10px;
        }

        /* 信息区 */
        .info-section { padding: 10px 18px 5px; }
        .name-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .name-bar h1 { font-size: 22px; font-weight: 800; }
        .status-dot { background: #e8f5e9; color: #2e7d32; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        .tag-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .tag-item { background: #f0f2f5; padding: 4px 10px; border-radius: 6px; font-size: 12px; color: #65676b; }

        .intro-text { font-size: 14px; line-height: 1.4; color: #444; margin-bottom: 10px; }

        /* 警告框：紧凑化 */
        .alert-box {
            background: #fff5f6; border-left: 4px solid var(--soft-red);
            padding: 8px 15px; margin: 0 15px 10px; border-radius: 4px;
        }
        .alert-box p { font-size: 12px; color: #d63031; font-weight: 500; line-height: 1.3; }

        /* 底部按钮：确保在屏幕最下方 */
        .action-area {
            margin-top: auto; padding: 10px 15px 25px; border-top: 1px solid #f8f9fa;
        }
        .wa-btn {
            background: var(--wa-green); color: #fff; padding: 15px; border-radius: 12px;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 17px; gap: 8px;
            box-shadow: 0 8px 15px rgba(37, 211, 102, 0.2);
            animation: soft-pulse 2s infinite;
        }
        @keyframes soft-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

    </style>
</head>
<body>

    <div class="main-card">
        <!-- 图片排列：一张大，两张小在下方左右排列 -->
        <div class="photo-section">
            <img src="1.jpg" class="img-top"> <!-- 侧脸图 -->
            <div class="img-bottom-row">
                <img src="2.jpg"> <!-- 背影图 -->
                <img src="3.jpg"> <!-- 局部图 -->
            </div>
        </div>

        <!-- 核心文案 -->
        <div class="info-section">
            <div class="name-bar">
                <h1>Aria, 36 ✨</h1>
                <span class="status-dot">● 正在线</span>
            </div>
            <div class="tag-row">
                <span class="tag-item">📍 吉隆坡</span>
                <span class="tag-item">💍 单身</span>
                <span class="tag-item">🎨 懂生活</span>
            </div>
            <p class="intro-text">
                与其在软件上划来划去，我更喜欢直接、真诚的交流。希望能在这里遇到一个成熟稳重的 Abang... ☕️
            </p>
        </div>

        <!-- 警告提醒 -->
        <div class="alert-box">
            <p>⚠️ 这里不常看，如果您是真诚想认识我，请直接加我私人的 WhatsApp 聊吧...</p>
        </div>

        <!-- 按钮区 -->
        <div class="action-area">
            <a href="https://hw.url668.com/s/GTCPr8BQN" id="contactButton" target="_blank" class="wa-btn">

                添加我的私密 WhatsApp
            </a>
            <p style="font-size: 10px; color: #bbb; margin-top: 5px; text-align: center;">点击按钮申请添加 · 保证真诚回复</p>
        </div>
    </div>

    <!-- 保持原始事件追踪逻辑 -->

    document.getElementById('contactButton').addEventListener('click', function() {

    }, false);
    </script>

</body>
</html>

    <style>
        :root { --soft-red: #ff4d6d; --wa-green: #25D366; --text-main: #2d3436; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, "PingFang SC", sans-serif;
            background: #f8f9fa; color: var(--text-main);
            display: flex; justify-content: center;
        }

        .phone-container {
            width: 100%; max-width: 450px; background: #fff; min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; padding-bottom: 100px;
        }

        /* 顶部封面图 */
        .cover-photo {
            width: 100%; height: 350px; position: relative;
            background: url('1.jpg') center/cover no-repeat; /* 使用第一张侧脸图 */
        }
        .cover-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
        }
        .cover-name {
            position: absolute; bottom: 20px; left: 20px; color: #fff;
        }
        .cover-name h1 { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .online-tag { background: #4cd137; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        /* 简介内容 */
        .content { padding: 25px 20px; }
        .bio-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .bio-text { font-size: 16px; line-height: 1.7; color: #636e72; margin-bottom: 25px; }

        /* 相册区 */
        .album-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .album-grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }

        /* 特别提示 */
        .notice-card {
            background: #fff5f6; border: 1px solid #ffdde1; padding: 15px; border-radius: 12px; margin-bottom: 25px;
        }
        .notice-card p { font-size: 14px; color: var(--soft-red); font-weight: 500; }

        /* 底部固定按钮 */
        .footer-cta {
            position: fixed; bottom: 0; max-width: 450px; width: 100%;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 15px 20px 30px; border-top: 1px solid #eee; text-align: center;
        }
        .wa-btn {
            background: var(--wa-green); color: #fff; padding: 16px; border-radius: 50px;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; gap: 10px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

    </style>
</head>
<body>

    <div class="phone-container">
        <!-- 头部大图 -->
        <div class="cover-photo">
            <div class="cover-overlay"></div>
            <div class="cover-name">
                <span class="online-tag">● 正在等候 Abang</span>
                <h1>Aria, 32</h1>
                <p style="opacity: 0.9; font-size: 14px;">📍 离你很近 · 刚上线</p>
            </div>
        </div>

        <div class="content">
            <div class="bio-title">✨ 关于我</div>
            <p class="bio-text">
                刚来吉隆坡生活不久，发现这座城市很大，心却很空。比起在App上漫无目的地滑动，我更希望能遇见一个成熟、稳重、懂生活的男人。
                <br><br>
                我不求轰轰烈烈，只希望在这个喧闹的城市里，有个可以聊聊天、偶尔一起喝杯咖啡的肩膀。
            </p>

            <div class="bio-title">📸 我的生活碎片</div>
            <div class="album-grid">
                <img src="2.jpg" alt="Aria life"> <!-- 酒红裙背影 -->
                <img src="3.jpg" alt="Aria private"> <!-- 室内局部 -->
            </div>

            <div class="notice-card">
                <p>⚠️ 平时比较忙，这里不常看。这是我私人的 WhatsApp，如果您是那位真诚的 Abang，请直接加我聊吧...</p>
            </div>
        </div>

        <div class="footer-cta">
            <a href="https://hw.url668.com/s/GTCPr8BQN" id="contactButton" target="_blank" class="wa-btn">

                加我的私密 WhatsApp
            </a>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">点击按钮申请添加私聊 · 保证真诚回复</p>
        </div>
    </div>

    <!-- 事件追踪脚本 -->
    <script type="text/javascript">
    document.getElementById('contactButton').addEventListener('click', function() {
        if (typeof fbq === 'function') {
            fbq('track', 'Contact');

</body>
</html>

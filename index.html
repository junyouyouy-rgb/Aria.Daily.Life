    <style>
        :root { --soft-red: #ff4d6d; --wa-green: #25D366; --text-main: #2d3436; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, "PingFang SC", sans-serif;
            background: #f0f2f5; color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            height: 100vh; overflow: hidden; /* 禁止全屏滚动 */
        }

        .main-card {
            width: 100%; max-width: 400px; background: #fff; height: 100vh;
            display: flex; flex-direction: column; position: relative;
        }

        /* 紧凑型头部：图片并排显示 */
        .visual-header {
            display: grid;
            grid-template-columns: 2fr 1fr; /* 左大右小 */
            gap: 4px; padding: 4px; height: 40vh; /* 占据屏幕40%高度 */
        }
        .main-img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px 4px 4px 12px; }
        .sub-imgs { display: grid; grid-template-rows: 1fr 1fr; gap: 4px; }
        .sub-imgs img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

        /* 个人信息 */
        .info-box { padding: 15px 20px 10px; }
        .name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .name-row h1 { font-size: 24px; font-weight: 800; }
        .status { background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        .tags { display: flex; gap: 8px; margin-bottom: 12px; }
        .tag { background: #f0f2f5; padding: 4px 12px; border-radius: 6px; font-size: 13px; color: #65676b; }

        /* 精简版自白 */
        .bio-short { font-size: 15px; line-height: 1.5; color: #444; margin-bottom: 15px; }

        /* 优化后的 Notice Card：更加紧凑且醒目 */
        .notice-mini {
            background: #fff5f6; border-left: 4px solid var(--soft-red);
            padding: 10px 15px; margin: 0 15px 15px; border-radius: 4px;
        }
        .notice-mini p { font-size: 13px; color: #d63031; font-weight: 500; line-height: 1.4; }

        /* 底部固定按钮区 */
        .footer-action {
            margin-top: auto; padding: 15px 20px 30px; border-top: 1px solid #f0f2f5;
        }
        .wa-btn {
            background: var(--wa-green); color: #fff; padding: 16px; border-radius: 12px;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; gap: 10px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
            animation: shake 4s infinite;
        }
        @keyframes shake {
            0%, 90%, 100% { transform: scale(1); }
            92% { transform: scale(1.05) rotate(1deg); }
            95% { transform: scale(1.05) rotate(-1deg); }
            98% { transform: scale(1.05) rotate(1deg); }
        }

    </style>
</head>
<body>

    <div class="main-card">
        <!-- 视觉展示区：三张图一次性展示 -->
        <div class="visual-header">
            <img src="1.jpg" class="main-img" alt="Aria"> <!-- 左侧大图：侧脸 -->
            <div class="sub-imgs">
                <img src="2.jpg" alt="Aria Life"> <!-- 右上：背影 -->
                <img src="3.jpg" alt="Aria Private"> <!-- 右下：局部 -->
            </div>
        </div>

        <!-- 基本资料 -->
        <div class="info-box">
            <div class="name-row">
                <h1>Aria, 36 ✨</h1>
                <span class="status">● 正在线</span>
            </div>
            <div class="tags">
                <span class="tag">📍 吉隆坡</span>
                <span class="tag">💍 单身</span>
                <span class="tag">🎨 懂生活</span>
            </div>
            <p class="bio-short">
                比起在软件上刷来刷去，我更喜欢直接、真诚的交流。希望能在这里遇到一个成熟稳重的 Abang... ☕️
            </p>
        </div>

        <!-- 紧凑警告卡片 -->
        <div class="notice-mini">
            <p>⚠️ 这里不常看，如果您是真诚想认识的 Abang，请直接加我私人的 WhatsApp 聊吧...</p>
        </div>

        <!-- 底部按钮 -->

                添加我的私密 WhatsApp

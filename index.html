<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria's Private Blog</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 85%; max-width: 350px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { margin: 10px 0; font-size: 22px; color: #333; }
        p { color: #777; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: block; background: #25D366; color: white; text-decoration: none; padding: 16px; border-radius: 50px; font-weight: bold; font-size: 17px; box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3); }
    </style>
    
    </head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/150" class="avatar" alt="Aria">
        <h2>很高兴认识你 ❤️</h2>
        <p>在大马生活好无聊呀，想找个真诚的人聊聊天，分享一下生活。点下面加我吧！</p>
        
        <a href="javascript:void(0);" onclick="redirectToWA()" class="btn">点击直接打开 WhatsApp</a>
    </div>

    <script>
        function redirectToWA() {
            // 这里可以放多个号码实现随机分流，保护账号
            var numbers = ['60167263029']; 
            var randomNum = numbers[Math.floor(Math.random() * numbers.length)];
            var text = encodeURIComponent("哈喽，我是从FB看到你的，很高兴认识你");
            
            // 使用 api 格式确保 iOS 跳转更稳
            window.location.href = "https://api.whatsapp.com/send?phone=" + randomNum + "&text=" + text;
        }
    </script>
</body>
</html>

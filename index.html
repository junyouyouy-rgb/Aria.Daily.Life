<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>遇见 Aria</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --wa-green: #25D366;
            --card-bg: rgba(255, 255, 255, 0.92);
            --text-dark: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, "PingFang SC", sans-serif;
            background: #000;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 背景图：使用亚洲女性神秘背影 */
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1539109132314-34a959df91f3?q=80&w=1000') center/cover;
            filter: blur(6px) brightness(0.6);
            transform: scale(1.1);
            z-index: 1;
        }

        .container {
            position: relative; z-index: 10;
            width: 92%; max-width: 370px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* 顶部进度条 */
        .progress-bar {
            position: absolute; top: 0; left: 0; height: 5px;
            background: var(--primary-gradient);
            width: 30%; transition: width 0.5s ease;
            border-radius: 30px 30px 0 0;
        }

        /* 头像容器 */
        .img-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        .deco-img { 
            width: 110px; height: 110px; 
            border-radius: 50%;
            object-fit: cover; 
            border: 3px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #eee;
        }
        .status-dot {
            position: absolute; bottom: 8px; right: 8px;
            width: 16px; height: 16px;
            background: #4cd137;
            border: 3px solid #fff;
            border-radius: 50%;
            animation: pulse-green 2s infinite;
        }

        h2 { font-size: 20px; color: var(--text-dark); margin-bottom: 25px; line-height: 1.5; font-weight: 600; }
        p { color: #666; font-size: 15px; margin-bottom: 20px; line-height: 1.6; }

        .opt-btn {
            display: block; width: 100%; padding: 16px; margin-bottom: 15px;
            background: #fff; border: 1px solid #f0f0f0; border-radius: 15px;
            font-size: 16px; color: #333; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .opt-btn:active { transform: scale(0.97); background: #fafafa; box-shadow: none; }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.6s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .final-btn {
            background: var(--wa-green); color: white; padding: 18px;
            border-radius: 50px; text-decoration: none; display: flex;
            align-items: center; justify-content: center; gap: 10px;
            font-weight: bold; font-size: 18px; margin-top: 10px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        /* 加载动画 */
        .spinner {
            width: 40px; height: 40px; border: 3px solid #f3f3f3;
            border-top: 3px solid #ff758c; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(76, 209, 55, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(76, 209, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 209, 55, 0); } }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    
    <div class="container">
        <div class="progress-bar" id="progress"></div>

        <!-- Step 1: 初见 (侧脸/氛围感) -->
        <div class="step active" id="step1">
            <div class="img-wrapper">
                <!-- 侧脸低头，看不清全脸 -->
                <img src="https://images.unsplash.com/photo-1524502391156-3dad1f637480?q=80&w=400" class="deco-img">
                <div class="status-dot"></div>
            </div>
            <h2>如果你在街角遇见我...<br>你会主动跟我打招呼吗？✨</h2>
            <button class="opt-btn" onclick="nextStep(2, 65)">会啊，感觉你很有气质</button>
            <button class="opt-btn" onclick="nextStep(2, 65)">可能会先偷偷看你一眼吧</button>
        </div>

        <!-- Step 2: 深入 (性感背影) -->
        <div class="step" id="step2">
            <div class="img-wrapper">
                <!-- 漏背或曲线背影 -->
                <img src="https://images.unsplash.com/photo-1515023115689-589c33041d3c?q=80&w=400" class="deco-img">
            </div>
            <h2>有人说我看起来有点高冷...<br>其实我只是在等那个懂我的人。</h2>
            <p>你觉得我们之间会有故事吗？</p>
            <button class="opt-btn" onclick="runLoading()">故事由你开始</button>
            <button class="opt-btn" onclick="runLoading()">想了解更真实的你</button>
        </div>

        <!-- Step Loading -->
        <div class="step" id="stepLoading">
            <div class="spinner"></div>
            <p>正在努力匹配你的频率...</p>
        </div>

        <!-- Step Final: 临门一脚 (回眸侧脸) -->
        <div class="step" id="stepFinal">
            <div class="img-wrapper">
                <!-- 模糊的回眸或局部特写 -->
                <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=400" class="deco-img">
                <div class="status-dot"></div>
            </div>
            <h2>感觉对了，就是现在。</h2>
            <p>这是我的私人 WhatsApp，<br>只限懂礼貌的哥哥加我哦... ❤️</p>
            <a href="javascript:void(0);" onclick="goWA()" class="final-btn">
                💬 立即开启私人对话
            </a>
        </div>
    </div>

    <script>
        const progress = document.getElementById('progress');

        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function nextStep(num, barWidth) {
            progress.style.width = barWidth + '%';
            showStep('step' + num);
        }

        function runLoading() {
            progress.style.width = '90%';
            showStep('stepLoading');
            setTimeout(() => {
                progress.style.width = '100%';
                showStep('stepFinal');
            }, 1500);
        }

        function goWA() {
            const text = encodeURIComponent("嗨 Aria，刚刚看了你的主页，觉得你很有神秘感，可以认识一下吗？");
            const phone = "60167263029"; 
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }
    </script>
</body>
</html>
